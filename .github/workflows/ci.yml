name: CI
# KTP-native CI for the KTPAMXX fork.
#
# Replaces the upstream AMX Mod X matrix (which cloned alliedmodders/hlsdk and
# alliedmodders/metamod-hl1) with a Linux-only build that uses afraznein/KTPHLSDK
# — our fork that adds `pfnClientCvarChanged` to NEW_DLL_FUNCTIONS.
#
# Windows MSVC is intentionally dropped: we don't ship a Windows KTPAMXX build.
# Plugin compilation (.sma → .amxx) is skipped here and validated separately via
# KTPInfrastructure's `make build-plugins` target, which the pre-push hook runs.

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    # Pinned to 22.04 (GLIBC 2.35) on purpose. Production is 24.04 (GLIBC 2.39),
    # but GLIBC is backward-compatible, not forward — a 22.04-built .so runs on
    # any glibc >=2.35, while a 24.04-built one would refuse to load anywhere
    # older. Keep 22.04 as the conservative symbol floor.
    runs-on: ubuntu-22.04
    # Matrix is gcc-only on purpose. clang-11 + -m32 + -flto is a known-broken
    # combo on 22.04 — GNU ld rejects clang's LTO bitcode with "final link
    # failed: bad value". We don't ship a clang build, and gcc-9 matches the
    # production WSL build pipeline, so a single compiler is the right scope.
    # If clang coverage becomes valuable, re-add as clang-14 (ships with 22.04,
    # newer LLVM handles 32-bit LTO), not clang-11.
    strategy:
      fail-fast: false
      matrix:
        include:
          - cc: gcc-9
            cxx: g++-9
            extra_install: gcc-9-multilib g++-9-multilib
    name: linux-${{ matrix.cc }}
    steps:
      - name: Checkout KTPAMXX
        uses: actions/checkout@v6
        with:
          submodules: recursive
          path: KTPAMXX

      - name: Checkout KTPhlsdk (KTP fork — adds pfnClientCvarChanged)
        uses: actions/checkout@v6
        with:
          repository: afraznein/KTPHLSDK
          path: KTPhlsdk

      - name: Clone metamod-hl1 (headers only, upstream is fine)
        run: git clone --depth=1 https://github.com/alliedmodders/metamod-hl1.git metamod-hl1

      - name: Clone AMBuild
        run: git clone --depth=1 https://github.com/alliedmodders/ambuild.git ambuild

      - uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install 32-bit toolchain + compiler
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-multilib g++-multilib libstdc++6 lib32stdc++6 \
            libc6-dev libc6-dev-i386 linux-libc-dev \
            linux-libc-dev:i386 lib32z1-dev nasm \
            ${{ matrix.cc }} ${{ matrix.extra_install }}

      - name: Install AMBuild
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install ./ambuild

      - name: Configure (extension-mode, no MySQL, no plugins)
        working-directory: KTPAMXX
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          ${{ matrix.cc }} --version
          ${{ matrix.cxx }} --version
          python3 configure.py \
            --enable-optimize \
            --no-mysql \
            --no-plugins \
            --hlsdk=../KTPhlsdk \
            --metamod=../metamod-hl1

      - name: Build
        working-directory: KTPAMXX/obj-linux
        run: ambuild

      - name: Verify artifacts
        working-directory: KTPAMXX
        run: |
          set -e
          AMXX=obj-linux/packages/base/addons/ktpamx/dlls/ktpamx_i386.so
          DODX=obj-linux/packages/dod/addons/ktpamx/modules/dodx_ktp_i386.so
          test -f "$AMXX" || { echo "MISSING: $AMXX"; exit 1; }
          test -f "$DODX" || { echo "MISSING: $DODX"; exit 1; }
          file "$AMXX" "$DODX"
          ls -lh "$AMXX" "$DODX"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ktpamxx-linux-${{ matrix.cc }}-${{ github.sha }}
          path: KTPAMXX/obj-linux/packages/
          retention-days: 7
